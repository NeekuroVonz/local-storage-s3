services:
  postgres:
    image: postgres:16-alpine
    container_name: storage-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: storage
      POSTGRES_PASSWORD: storage
      POSTGRES_DB: storage_platform
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U storage -d storage_platform"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - storage-network

  redis:
    image: redis:7-alpine
    container_name: storage-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - storage-network

  garage:
    image: dxflrs/garage:v2.3.0
    container_name: storage-garage
    restart: unless-stopped
    command: ["/garage", "server", "--single-node", "--default-bucket"]
    environment:
      GARAGE_DEFAULT_ACCESS_KEY: ${GARAGE_DEFAULT_ACCESS_KEY}
      GARAGE_DEFAULT_SECRET_KEY: ${GARAGE_DEFAULT_SECRET_KEY}
      GARAGE_DEFAULT_BUCKET: ${GARAGE_DEFAULT_BUCKET:-storage}
    ports:
      - "${GARAGE_S3_PORT:-3900}:3900"
    volumes:
      - ./garage/garage.toml:/etc/garage.toml:ro
      - garage_meta:/var/lib/garage/meta
      - garage_data:/var/lib/garage/data
    healthcheck:
      test: ["CMD", "/garage", "status"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - storage-network

  backend:
    build:
      context: ..
      dockerfile: docker/backend/Dockerfile
    container_name: storage-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      garage:
        condition: service_healthy
    environment:
      NODE_ENV: production
      BACKEND_PORT: 4000
      DATABASE_URL: postgresql://storage:storage@postgres:5432/storage_platform?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-change-me-to-a-secure-random-string-at-least-32-chars-long}
      S3_ENDPOINT: ${S3_ENDPOINT:-http://garage:3900}
      S3_REGION: ${S3_REGION:-garage}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-true}
      S3_PUBLIC_ENDPOINT: ${S3_PUBLIC_ENDPOINT:-http://garage:3900}
      GARAGE_ADMIN_ENDPOINT: ${GARAGE_ADMIN_ENDPOINT:-http://garage:3903}
      GARAGE_ADMIN_TOKEN: ${GARAGE_ADMIN_TOKEN:-}
      CREDENTIALS_ENCRYPTION_KEY: ${CREDENTIALS_ENCRYPTION_KEY:-}
      APP_URL: ${APP_URL:-http://localhost:3000}
    ports:
      - "${BACKEND_PORT:-4000}:4000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - storage-network

  frontend:
    build:
      context: ..
      dockerfile: docker/frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000/api/v1}
    container_name: storage-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NODE_ENV: production
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    networks:
      - storage-network

volumes:
  postgres_data:
  redis_data:
  garage_meta:
  garage_data:

networks:
  storage-network:
    driver: bridge
