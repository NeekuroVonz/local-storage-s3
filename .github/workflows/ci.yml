name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build shared
        run: bun run --filter @storage/shared build

      - name: Generate Prisma client
        run: bun run db:generate
        env:
          DATABASE_URL: postgresql://storage:storage@localhost:5432/storage_platform

      - name: Lint backend
        run: bun run --filter @storage/backend exec tsc --noEmit

      - name: Lint frontend
        run: bun run --filter @storage/frontend exec tsc --noEmit

      - name: Build backend
        run: bun run --filter @storage/backend build
        env:
          DATABASE_URL: postgresql://storage:storage@localhost:5432/storage_platform
          JWT_SECRET: change-me-to-a-secure-random-string-at-least-32-chars
          S3_ENDPOINT: http://localhost:3900
          S3_ACCESS_KEY_ID: test
          S3_SECRET_ACCESS_KEY: test

      - name: Build frontend
        run: bun run --filter @storage/frontend build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:4000/api/v1
